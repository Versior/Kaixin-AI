services:
  app:
    image: ghcr.io/versior/kaixin-ai:main
    container_name: infinite-canvas
    env_file:
      - .env
    environment:
      # 以下为可选覆盖项，优先读取 .env 文件
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - PORT=${BACKEND_PORT:-8080}
      - STORAGE_DRIVER=${STORAGE_DRIVER:-sqlite}
      - DATABASE_DSN=${DATABASE_DSN:-data/infinite-canvas.db}
      - PUBLIC_IMAGE_BASE_URL=${PUBLIC_IMAGE_BASE_URL:-http://localhost:3000}
      - GIN_MODE=${GIN_MODE:-release}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_HOURS=${JWT_EXPIRE_HOURS:-168}
      - PROMPT_DATA_DIR=${PROMPT_DATA_DIR:-/app/data/prompts}
    volumes:
      - ./data:/app/data
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped
